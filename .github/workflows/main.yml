name: Build and Deploy

on:
 push:
   branches: [ main ]

jobs:
 build-and-deploy:
   runs-on: ubuntu-latest
   steps:
     - name: Checkout code
       uses: actions/checkout@v4

     # 1. เชื่อมต่อ Google Cloud ด้วย Secret ที่เราสร้างไว้
     - name: Auth to Google Cloud
       uses: google-github-actions/auth@v2
       with:
         credentials_json: ${{ secrets.GCP_SA_KEY }}

     # 2. ตั้งค่า Docker ให้คุยกับ Google Artifact Registry ได้
     - name: Configure Docker
       run: gcloud auth configure-docker gcr.io --quiet

     # 3. Build และ Push ไปยัง Google Artifact Registry
     - name: Build and Push
       run: |
         docker build . -t gcr.io/[PROJECT_ID]/cargo-safety-app:latest
         docker push gcr.io/[PROJECT_ID]/cargo-safety-app:latest

     # 4. Deploy ไปยัง Google Cloud Run
     - name: Deploy to Cloud Run
       run: |
         gcloud run deploy cargo-safety-api \
           --image gcr.io/[PROJECT_ID]/cargo-safety-app:latest \
           --region asia-southeast1 \
           --allow-unauthenticated \
           --memory 2Gi \
           --cpu 1
