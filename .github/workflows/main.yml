name: Deploy to Google Cloud Run

# ทำงานทุกครั้งที่มีการกด Push โค้ดเข้า branch 'main'
on:
  push:
    branches: [ main ]

env:
  # กำหนดตัวแปรสภาพแวดล้อม
  REGION: asia-southeast1
  REPO_NAME: cargo-repo
  SERVICE_NAME: cargo-safety-api
  IMAGE_NAME: cargo-safety-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. ดึงโค้ดล่าสุดจาก Repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. ยืนยันตัวตนกับ Google Cloud ด้วยไฟล์ JSON Key
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. ตั้งค่า Google Cloud SDK
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. ล็อกอินเข้า Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # 5. Build Docker Image (เขียนเป็นบรรทัดเดียวเพื่อป้องกัน Error การเว้นวรรค)
      - name: Build Docker Image
        run: docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # 6. Push Docker Image ขึ้น Artifact Registry (เขียนเป็นบรรทัดเดียวเช่นกัน)
      - name: Push Docker Image
        run: docker push ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}


      # 7. สั่ง Deploy ขึ้น Cloud Run (ใช้ Action ของ Google โดยตรงเพื่อความเสถียร)
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated --memory=2Gi --cpu=1 --port=8080'
